name: Build & Release

on:
  push:
    tags:
      - "v*"
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex: v0.9.2)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyinstaller pytesseract pillow pdf2image reportlab PyPDF2 pdf2docx PyQt6 spacy

      - name: Download spaCy Portuguese model
        run: python -m spacy download pt_core_news_lg

      # ── Tesseract via Chocolatey (já disponível no runner) ───────────────────
      - name: Install Tesseract via Chocolatey
        shell: pwsh
        run: |
          choco install tesseract --yes --no-progress `
            --params "'/Components:por /Components:eng'"
          # Aguarda finalização e atualiza PATH
          Start-Sleep -Seconds 10
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path", "Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path", "User")

      - name: Locate and copy Tesseract to deps/
        shell: pwsh
        run: |
          # Encontra onde o choco instalou
          $tess = Get-Command tesseract -ErrorAction SilentlyContinue
          if ($tess) {
            $tessDir = Split-Path $tess.Source
          } else {
            # Fallback: caminhos padrão do choco
            $candidates = @(
              "C:\Program Files\Tesseract-OCR",
              "C:\tools\tesseract",
              "C:\ProgramData\chocolatey\bin"
            )
            $tessDir = $candidates | Where-Object { Test-Path "$_\tesseract.exe" } | Select-Object -First 1
          }

          # Último recurso: busca recursiva
          if (-not $tessDir -or -not (Test-Path "$tessDir\tesseract.exe")) {
            Write-Host "Buscando tesseract.exe recursivamente..."
            $found = Get-ChildItem "C:\Program Files", "C:\ProgramData\chocolatey", "C:\tools" `
                       -Recurse -Filter "tesseract.exe" -ErrorAction SilentlyContinue |
                       Select-Object -First 1
            if ($found) {
              $tessDir = $found.DirectoryName
            } else {
              Write-Error "Tesseract não encontrado! Abortando."
              exit 1
            }
          }

          Write-Host "Tesseract dir: $tessDir"

          New-Item -ItemType Directory -Path deps\tesseract -Force | Out-Null

          Copy-Item "$tessDir\tesseract.exe" deps\tesseract\
          Get-ChildItem "$tessDir\*.dll" -ErrorAction SilentlyContinue |
            Copy-Item -Destination deps\tesseract\

          # tessdata
          $tessdata = "$tessDir\tessdata"
          if (Test-Path $tessdata) {
            Copy-Item $tessdata deps\tesseract\ -Recurse
          }

          # Baixa modelos por/eng caso não estejam presentes
          $tdDest = "deps\tesseract\tessdata"
          New-Item -ItemType Directory -Path $tdDest -Force | Out-Null

          foreach ($lang in @("por", "eng", "osd")) {
            $dest = "$tdDest\$lang.traineddata"
            if (-not (Test-Path $dest)) {
              $src = "https://github.com/tesseract-ocr/tessdata/raw/main/$lang.traineddata"
              Write-Host "Baixando $lang.traineddata..."
              Invoke-WebRequest -Uri $src -OutFile $dest -UseBasicParsing
            }
          }

          # Remove modelos desnecessários para reduzir tamanho
          Get-ChildItem "$tdDest\*.traineddata" |
            Where-Object { $_.Name -notmatch "^(por|eng|osd)\.traineddata$" } |
            Remove-Item -Force

          # Confirma
          Write-Host "=== deps\tesseract ==="
          Get-ChildItem deps\tesseract -Recurse | Select-Object FullName

      # ── Poppler ──────────────────────────────────────────────────────────────
      - name: Install Poppler via Chocolatey
        shell: pwsh
        run: choco install poppler --yes --no-progress

      - name: Locate and copy Poppler to deps/
        shell: pwsh
        run: |
          $pdftoppm = Get-Command pdftoppm -ErrorAction SilentlyContinue
          if ($pdftoppm) {
            $binDir = Split-Path $pdftoppm.Source
          } else {
            # Fallback: procura recursivamente em C:\tools e C:\ProgramData\chocolatey
            $found = Get-ChildItem "C:\tools", "C:\ProgramData\chocolatey" `
                       -Recurse -Filter "pdftoppm.exe" -ErrorAction SilentlyContinue |
                       Select-Object -First 1
            if (-not $found) {
              # Segunda tentativa: baixar zip direto
              Write-Host "Baixando Poppler do GitHub..."
              $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.02.0-0/Release-24.02.0-0.zip"
              Invoke-WebRequest -Uri $url -OutFile poppler.zip -UseBasicParsing
              Expand-Archive poppler.zip poppler_extracted -Force
              $found = Get-ChildItem poppler_extracted -Recurse -Filter "pdftoppm.exe" |
                       Select-Object -First 1
            }
            $binDir = $found.DirectoryName
          }
          Write-Host "Poppler bin: $binDir"

          New-Item -ItemType Directory -Path deps\poppler\bin -Force | Out-Null
          Get-ChildItem "$binDir\*.exe" | Copy-Item -Destination deps\poppler\bin\
          Get-ChildItem "$binDir\*.dll" -ErrorAction SilentlyContinue |
            Copy-Item -Destination deps\poppler\bin\

          Write-Host "=== deps\poppler\bin ==="
          Get-ChildItem deps\poppler\bin | Select-Object Name

      # ── Build EXE ────────────────────────────────────────────────────────────
      - name: Build EXE with PyInstaller
        run: pyinstaller pdf_ocr.spec

      - name: Verify EXE
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\PDF_Tools.exe")) {
            Write-Error "dist\PDF_Tools.exe not found!"
            exit 1
          }
          $size = [math]::Round((Get-Item "dist\PDF_Tools.exe").Length / 1MB, 1)
          Write-Host "EXE gerado com sucesso: $size MB"

      # ── Release ──────────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_Tools_Windows
          path: dist/PDF_Tools.exe

      - name: Resolve release tag
        id: resolve_tag
        shell: pwsh
        run: |
          $tag = ""
          if ("${{ github.ref_type }}" -eq "tag") {
            $tag = "${{ github.ref_name }}"
          } elseif ("${{ github.event.inputs.tag }}" -ne "") {
            $tag = "${{ github.event.inputs.tag }}"
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT
          echo "publish=$(if ($tag) { 'true' } else { 'false' })" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.resolve_tag.outputs.publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: dist/PDF_Tools.exe
          name: "PDF Tools ${{ steps.resolve_tag.outputs.tag }}"
          body: |
            ## ${{ steps.resolve_tag.outputs.tag }} — PDF Tools

            ### ✦ OCR mais preciso
            Removido o pré-processamento agressivo (binarização, filtro mediana, contraste forçado) que era aplicado antes do Tesseract. Em PDFs de qualidade normal ou alta, esse processamento degradava o texto reconhecido. O Tesseract agora recebe a imagem original.

            ### ✦ Erros da OpenAI visíveis
            Falhas na API OpenAI (chave inválida, sem conexão, limite de tokens) agora aparecem como aviso na tela. Antes, os erros eram engolidos silenciosamente. A barra de status também indica quando a chamada OpenAI está em andamento.

            ### ✦ Modelo spaCy corrigido no EXE (v2.0.2)
            O path real do modelo dentro do EXE é `pt_core_news_lg/pt_core_news_lg-X.Y.Z/` (com versão), não `pt_core_news_lg/pt_core_news_lg/`.

            ---
            Veja o [histórico de versões](https://github.com/nicolastd5/pdf-ocr/releases) para versões anteriores.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
