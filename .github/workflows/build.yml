name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pyinstaller pytesseract pillow pdf2image reportlab PyPDF2

      - name: Build EXE with PyInstaller
        run: pyinstaller pdf_ocr.spec

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_OCR_Windows
          path: dist/PDF_OCR.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDF_OCR.exe
          name: "PDF OCR ${{ github.ref_name }}"
          body: |
            ## PDF OCR ${{ github.ref_name }}

            ### Download
            Baixe o arquivo `PDF_OCR.exe` abaixo e execute diretamente — sem precisar instalar Python.

            ### Requisitos externos (instalar separadamente)
            - **Tesseract OCR**: https://github.com/UB-Mannheim/tesseract/wiki
              *(marque o pacote de idioma "Portuguese" durante a instalação)*
            - **Poppler**: https://github.com/oschwartz10612/poppler-windows/releases
              *(extraia em `C:\Program Files\poppler\Library\bin`)*

            ### Novidades desta versão
            - Interface com abas (OCR / Sobre)
            - Auto-update: verificação automática de novas versões
            - Botão de atualização manual na aba Sobre
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
