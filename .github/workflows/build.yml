name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyinstaller pytesseract pillow pdf2image reportlab PyPDF2

      # ── Tesseract OCR ────────────────────────────────────────────────────────
      - name: Download Tesseract installer
        shell: pwsh
        run: |
          $url = "https://github.com/UB-Mannheim/tesseract/releases/download/v5.4.0.20240606/tesseract-ocr-w64-setup-5.4.0.20240606.exe"
          Invoke-WebRequest -Uri $url -OutFile tesseract_installer.exe -UseBasicParsing

      - name: Install Tesseract silently
        shell: pwsh
        run: |
          Start-Process -FilePath ".\tesseract_installer.exe" `
            -ArgumentList "/S", "/COMPONENTS=lang_por,lang_eng", "/D=C:\Tesseract" `
            -Wait -NoNewWindow
          Start-Sleep -Seconds 5

      - name: Copy Tesseract to deps/
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path deps\tesseract -Force
          Copy-Item "C:\Tesseract\tesseract.exe" deps\tesseract\
          Get-ChildItem "C:\Tesseract\*.dll" | Copy-Item -Destination deps\tesseract\ -ErrorAction SilentlyContinue
          Copy-Item "C:\Tesseract\tessdata" deps\tesseract\ -Recurse
          # Mantém apenas os modelos necessários
          Get-ChildItem deps\tesseract\tessdata -File |
            Where-Object { $_.Name -notmatch "^(por|eng|osd)\.traineddata$" } |
            Remove-Item -Force

      # ── Poppler ──────────────────────────────────────────────────────────────
      - name: Download and extract Poppler
        shell: pwsh
        run: |
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.02.0-0/Release-24.02.0-0.zip"
          Invoke-WebRequest -Uri $url -OutFile poppler.zip -UseBasicParsing
          Expand-Archive -Path poppler.zip -DestinationPath poppler_extracted -Force

      - name: Copy Poppler to deps/
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path deps\poppler\bin -Force
          $binDir = Get-ChildItem -Path poppler_extracted -Recurse -Filter "pdftoppm.exe" |
                    Select-Object -First 1 -ExpandProperty DirectoryName
          Get-ChildItem "$binDir\*.exe" | Copy-Item -Destination deps\poppler\bin\
          Get-ChildItem "$binDir\*.dll" | Copy-Item -Destination deps\poppler\bin\ -ErrorAction SilentlyContinue

      # ── Build EXE ────────────────────────────────────────────────────────────
      - name: Build EXE with PyInstaller
        run: pyinstaller pdf_ocr.spec

      - name: Verify EXE was created
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\PDF_OCR.exe")) {
            Write-Error "dist\PDF_OCR.exe not found!"
            exit 1
          }
          $size = (Get-Item "dist\PDF_OCR.exe").Length / 1MB
          Write-Host "EXE size: $([math]::Round($size,1)) MB"

      # ── Release ──────────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_OCR_Windows
          path: dist/PDF_OCR.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDF_OCR.exe
          name: "PDF OCR ${{ github.ref_name }}"
          body: |
            ## PDF OCR ${{ github.ref_name }}

            ### Download
            Baixe o `PDF_OCR.exe` e execute diretamente — **sem instalar nada**.
            Tesseract OCR e Poppler já estão embutidos no executável.

            ### Novidades desta versão
            - Janela de atualização com changelog completo ao detectar nova versão
            - Download e aplicação automática do update com barra de progresso
            - Projeto estruturado para VS Code (.vscode/, launch.json, extensions.json)
            - Correção do build: link do Tesseract atualizado para v5.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
